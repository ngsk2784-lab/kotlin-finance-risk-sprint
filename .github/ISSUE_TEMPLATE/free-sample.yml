name: 무료 공개 저장소 샘플 요청
description: 권한 있는 공개 Kotlin/Spring 범위에 7개 정적 체크 샘플을 요청합니다.
title: "[무료 샘플] "
labels:
  - free-sample
body:
  - type: markdown
    attributes:
      value: |
        공개 저장소만 요청할 수 있습니다. 비공개 코드, 토큰, 비밀번호, 고객·금융 데이터, 코드 조각은 이 Issue에 올리지 마세요.

        샘플 범위는 최대 20개 소스 파일 또는 5,000 LoC 중 먼저 도달하는 지점이며, 제공물은 1쪽 요약과 대표 후보 최대 3건입니다. 리미디에이션 슬롯은 포함되지 않습니다.

  - type: input
    id: repository
    attributes:
      label: 공개 저장소 URL
      description: 본인이 소유하거나 검사를 승인할 권한이 있는 공개 저장소만 입력하세요.
      placeholder: https://github.com/owner/repository
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: 고정 커밋 SHA
      description: 검사 결과를 재현할 수 있도록 전체 커밋 SHA를 입력하세요.
      placeholder: 40-character commit SHA
    validations:
      required: true

  - type: input
    id: path
    attributes:
      label: Kotlin/Spring 서비스 경로
      description: 저장소 안에서 검사할 한 서비스의 상대 경로만 입력하세요.
      placeholder: services/payment-api
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: 예상 파일 수와 Kotlin LoC
      description: 최대 20개 파일 또는 5,000 LoC 범위인지 확인하기 위한 대략적인 수치입니다.
      placeholder: 12 files / 2,800 LoC
    validations:
      required: true

  - type: textarea
    id: focus
    attributes:
      label: 특히 확인할 신호
      description: 7개 체크 중 우선 확인할 항목을 적으세요. 코드나 비밀정보는 붙이지 마세요.
      placeholder: "예: 외부 결제 API의 타임아웃·재시도 설정"
    validations:
      required: false

  - type: checkboxes
    id: authorization
    attributes:
      label: 권한과 범위 확인
      options:
        - label: 이 저장소를 소유하거나 위 고정 범위의 검사를 요청할 권한이 있습니다.
          required: true
        - label: 공개 저장소라는 사실만으로 결과 공개에 동의하는 것은 아니며, 별도 허락 없이 결과를 게시하지 않는다는 조건을 이해합니다.
          required: true
        - label: 비공개 코드·자격증명·실제 고객 또는 금융 데이터를 제공하지 않았습니다.
          required: true
